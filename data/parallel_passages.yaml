# Synoptic Gospel Parallels — Phase 1
#
# Each entry is a set of parallel passages (pericopes that share the same event
# or teaching). The adapter emits bidirectional StudyNote(NoteType.PARALLEL) links
# for every passage in the group, so each chapter notes file can reference all
# parallels to that pericope.
#
# Format:
#   - title: human-readable pericope title
#     passages:
#       - {book: "...", chapter: N, verse_start: N, verse_end: N}
#       ...
#
# Sources: Aland Gospel Parallels (8th ed.); Orthodox Study Bible pericope headings.
# Phase 1 scope: synoptic triple tradition + key double tradition + John parallels.

parallels:

